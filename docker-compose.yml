version: "3.8"

services:
  webapp:
    build: .
    container_name: settlement-dashboard
    restart: unless-stopped
    ports:
      - "8501:8501"   # ERP (Streamlit)
      - "8502:8502"   # 지점 포털 (FastAPI)
    volumes:
      - ./data:/app/data
      - ./mapping:/app/mapping
      - ./static:/app/static        # JS/CSS/이미지 변경 시 재빌드 불필요
      - ./templates:/app/templates  # HTML 템플릿 변경 시 재빌드 불필요
    environment:
      - TZ=Asia/Seoul
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
